# Server
server.port=${PORT:8081}

# Database (PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/codeshield}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true

# Google OAuth
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}

# JWT
app.jwt.secret=${JWT_SECRET:codeshield-ai-super-secret-key-that-is-at-least-256-bits-long-for-hmac}

# Gemini AI
app.gemini.api-key=${GEMINI_API_KEY}
app.gemini.model=gemini-2.5-flash

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200}

# Actuator
management.endpoints.web.exposure.include=health,info
