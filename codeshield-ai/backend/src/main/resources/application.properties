# Server
server.port=${PORT:8081}

# Database (PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/codeshield}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true

# Google OAuth
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}

# JWT
app.jwt.secret=${JWT_SECRET:codeshield-ai-super-secret-key-that-is-at-least-256-bits-long-for-hmac}

# Gemini AI
app.gemini.api-key=${GEMINI_API_KEY}
app.gemini.model=gemini-2.5-flash

# Groq AI (fallback)
app.groq.api-key=${GROQ_API_KEY:}

# Cerebras AI (fallback)
app.cerebras.api-key=${CEREBRAS_API_KEY:}

# GitHub OAuth & API
app.github.client-id=${GITHUB_CLIENT_ID:}
app.github.client-secret=${GITHUB_CLIENT_SECRET:}
app.github.webhook-secret=${GITHUB_WEBHOOK_SECRET:codeshield-webhook-secret}

# Backend URL (for webhook registration)
app.backend.url=${BACKEND_URL:http://localhost:8081}

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200}

# Actuator
management.endpoints.web.exposure.include=health,info
