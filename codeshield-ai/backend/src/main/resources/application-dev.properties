# Import .env file (one-time setup — just edit .env when keys expire)
spring.config.import=optional:file:.env[.properties]

# Server
server.port=8081

# Database (H2 file-based — works offline, persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/codeshield;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway
spring.flyway.enabled=false

# H2 Console (http://localhost:8081/h2-console)
spring.h2.console.enabled=true

# Logging
logging.level.com.codeshield=DEBUG

# Google OAuth
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}

# JWT
app.jwt.secret=${JWT_SECRET:codeshield-ai-dev-secret-key-that-is-at-least-256-bits-long-for-hmac-sha}

# Gemini AI
app.gemini.api-key=${GEMINI_API_KEY}
app.gemini.model=gemini-2.5-flash

# Groq AI (fallback)
app.groq.api-key=${GROQ_API_KEY:}

# Cerebras AI (fallback)
app.cerebras.api-key=${CEREBRAS_API_KEY:}

# CORS
app.cors.allowed-origins=http://localhost:4200
