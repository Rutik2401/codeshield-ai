# Server
server.port=8081

# Database (H2 file-based for dev — persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/codeshield;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway (disabled for H2)
spring.flyway.enabled=false

# H2 Console
spring.h2.console.enabled=true

# Logging
logging.level.com.codeshield=DEBUG
logging.level.org.springframework.web=DEBUG

# Google OAuth
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}

# JWT
app.jwt.secret=${JWT_SECRET:codeshield-ai-dev-secret-key-that-is-at-least-256-bits-long-for-hmac-sha}

# Gemini AI
app.gemini.api-key=${GEMINI_API_KEY:dev-placeholder}
app.gemini.model=gemini-2.5-flash

# CORS
app.cors.allowed-origins=http://localhost:4200
