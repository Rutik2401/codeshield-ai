# Server
server.port=8081

# Database (H2 for tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=false

# Google OAuth
app.google.client-id=test-client-id
app.google.client-secret=test-client-secret

# JWT
app.jwt.secret=codeshield-ai-super-secret-key-that-is-at-least-256-bits-long-for-hmac

# Gemini AI
app.gemini.api-key=test-api-key
app.gemini.model=gemini-2.5-flash

# CORS
app.cors.allowed-origins=http://localhost:4200

# Actuator
management.endpoints.web.exposure.include=health,info
