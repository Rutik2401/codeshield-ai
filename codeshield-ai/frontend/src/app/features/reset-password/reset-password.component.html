<div class="min-h-screen flex items-center justify-center px-4" style="background-color: var(--bg-primary);">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center"
           style="background: linear-gradient(135deg, var(--color-primary), #1D4ED8);">
        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2L3 7v10l9 5 9-5V7l-9-5zm0 2.18l6.5 3.64v7.36L12 18.82l-6.5-3.64V7.82L12 4.18z"/>
        </svg>
      </div>
      <span class="text-lg font-bold" style="color: var(--text-primary);">
        CodeShield <span style="color: var(--color-primary);">AI</span>
      </span>
    </div>

    <div class="rounded-2xl p-6 sm:p-8"
         style="background: var(--bg-surface); border: 1px solid var(--border-default);">

      @if (success()) {
        <!-- Success state -->
        <div class="text-center py-4">
          <div class="w-14 h-14 mx-auto mb-4 rounded-full flex items-center justify-center"
               style="background: rgba(34, 197, 94, 0.1);">
            <svg class="w-7 h-7" style="color: #22c55e;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <h2 class="text-lg font-semibold mb-2" style="color: var(--text-primary);">Password reset!</h2>
          <p class="text-sm mb-6" style="color: var(--text-tertiary);">Your password has been changed successfully. You can now sign in.</p>
          <a routerLink="/"
             class="inline-block px-6 py-3 rounded-xl font-semibold text-sm text-white cursor-pointer transition-all hover:-translate-y-0.5"
             style="background: linear-gradient(135deg, var(--color-primary), #6366F1);">
            Go to Sign In
          </a>
        </div>
      } @else {
        <!-- Reset form -->
        <h2 class="text-lg font-semibold mb-1" style="color: var(--text-primary);">Set new password</h2>
        <p class="text-xs mb-6" style="color: var(--text-tertiary);">Enter your new password below.</p>

        @if (error()) {
          <div class="mb-4 p-3 rounded-xl text-sm font-medium flex items-center gap-2"
               style="background: rgba(239, 68, 68, 0.1); color: var(--color-critical); border: 1px solid rgba(239, 68, 68, 0.15);">
            <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
            {{ error() }}
          </div>
        }

        <!-- New password -->
        <label class="block mb-4">
          <span class="text-xs font-medium mb-1.5 block" style="color: var(--text-secondary);">New password</span>
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4" style="color: var(--text-tertiary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="newPassword" placeholder="Min. 6 characters"
                   class="w-full pl-10 pr-10 py-3 rounded-xl text-sm outline-none transition-all"
                   style="background: var(--bg-surface-hover); border: 1px solid var(--border-default); color: var(--text-primary);"
                   (focus)="onFocus($event)" (blur)="onBlur($event)">
            <button (click)="showPassword = !showPassword" class="absolute right-3.5 top-1/2 -translate-y-1/2 p-0.5 cursor-pointer" style="color: var(--text-tertiary);">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                @if (showPassword) {
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21"/>
                } @else {
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                }
              </svg>
            </button>
          </div>
        </label>

        <!-- Confirm password -->
        <label class="block mb-6">
          <span class="text-xs font-medium mb-1.5 block" style="color: var(--text-secondary);">Confirm password</span>
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4" style="color: var(--text-tertiary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword" placeholder="Repeat password"
                   class="w-full pl-10 pr-4 py-3 rounded-xl text-sm outline-none transition-all"
                   style="background: var(--bg-surface-hover); border: 1px solid var(--border-default); color: var(--text-primary);"
                   (focus)="onFocus($event)" (blur)="onBlur($event)"
                   (keydown.enter)="submit()">
          </div>
        </label>

        <!-- Submit -->
        <button (click)="submit()" [disabled]="isSubmitting()"
                class="w-full py-3.5 rounded-xl font-semibold text-sm text-white flex items-center justify-center gap-2 transition-all duration-200 disabled:opacity-50 cursor-pointer"
                style="background: linear-gradient(135deg, var(--color-primary), #6366F1); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);">
          @if (isSubmitting()) {
            <div class="w-4 h-4 rounded-full border-2 border-white/30 border-t-white animate-spin"></div>
          }
          Reset Password
        </button>
      }
    </div>
  </div>
</div>
