<div class="min-h-screen flex flex-col relative" style="background-color: var(--bg-primary); color: var(--text-primary);">
  <app-navbar />
  <main class="flex-1">
    <router-outlet />
  </main>
  <app-footer />
  <app-command-palette />
  <app-auth-modal />

  <!-- Toast notification -->
  @if (auth.toastMessage()) {
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[300] px-5 py-3 rounded-xl text-sm font-medium flex items-center gap-2.5 shadow-2xl"
         style="background: var(--bg-surface); border: 1px solid var(--color-accent); color: var(--color-accent); box-shadow: 0 8px 30px rgba(34, 197, 94, 0.15); animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);">
      <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
      </svg>
      {{ auth.toastMessage() }}
    </div>
  }
</div>
