@if (isOpen()) {
  <!-- Backdrop -->
  <div class="fixed inset-0 z-[100] bg-black/40 backdrop-blur-sm"
       (click)="close()"
       style="animation: fadeIn 0.15s ease-out;"></div>

  <!-- Palette -->
  <div class="fixed z-[101] top-[20%] left-1/2 -translate-x-1/2 w-full max-w-lg"
       style="animation: slideDown 0.2s cubic-bezier(0.16, 1, 0.3, 1);">
    <div class="mx-4 rounded-2xl overflow-hidden shadow-2xl shadow-black/20 glass-card border border-slate-700/50">
      <!-- Search input -->
      <div class="flex items-center gap-3 px-5 py-4 border-b border-slate-700/50">
        <svg class="w-5 h-5 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text"
               [(ngModel)]="query"
               placeholder="Type a command..."
               class="flex-1 bg-transparent text-white text-sm outline-none placeholder-gray-500"
               (keydown.escape)="close()"
               (keydown.enter)="executeFirst()"
               (keydown.arrowDown)="moveSelection(1)"
               (keydown.arrowUp)="moveSelection(-1)"
               #searchInput>
        <kbd class="hidden sm:inline-flex px-2 py-0.5 rounded text-xs font-mono text-gray-400 border border-slate-700 bg-slate-800">ESC</kbd>
      </div>

      <!-- Results -->
      <div class="max-h-72 overflow-y-auto py-2">
        @for (cmd of filteredCommands(); track cmd.id; let i = $index) {
          <button (click)="execute(cmd)"
                  class="w-full flex items-center gap-3 px-5 py-3 text-left transition-colors cursor-pointer"
                  [class]="selectedIndex() === i ? 'bg-primary/8 text-primary' : 'text-gray-300 hover:bg-slate-800/50'">
            <span class="text-lg shrink-0">{{ cmd.icon }}</span>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate">{{ cmd.label }}</p>
              <p class="text-xs text-gray-500">{{ cmd.category }}</p>
            </div>
            @if (cmd.shortcut) {
              <kbd class="hidden sm:inline-flex px-2 py-0.5 rounded text-xs font-mono text-gray-400 border border-slate-700 bg-slate-800 shrink-0">{{ cmd.shortcut }}</kbd>
            }
          </button>
        }
        @if (filteredCommands().length === 0) {
          <div class="px-5 py-8 text-center text-sm text-gray-500">
            No commands found
          </div>
        }
      </div>
    </div>
  </div>
}
