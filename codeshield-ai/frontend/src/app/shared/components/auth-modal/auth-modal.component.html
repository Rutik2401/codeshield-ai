@if (auth.showAuthModal()) {
  <!-- Backdrop -->
  <div class="fixed inset-0 z-[200] flex items-center justify-center p-4"
       style="animation: fadeIn 0.2s ease-out;">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" (click)="auth.closeModal()"></div>

    <!-- Modal -->
    <div class="relative w-full max-w-md rounded-2xl overflow-hidden"
         style="background: var(--bg-surface); border: 1px solid var(--border-default); box-shadow: 0 25px 60px rgba(0,0,0,0.3);
                animation: scaleIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);">

      <!-- Header -->
      <div class="flex items-center justify-between px-6 pt-6 pb-4">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center"
               style="background: linear-gradient(135deg, var(--color-primary), #1D4ED8);">
            <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2L3 7v10l9 5 9-5V7l-9-5zm0 2.18l6.5 3.64v7.36L12 18.82l-6.5-3.64V7.82L12 4.18z"/>
            </svg>
          </div>
          <span class="font-bold text-sm" style="color: var(--text-primary);">CodeShield AI</span>
        </div>
        <button (click)="auth.closeModal()" class="p-1.5 rounded-lg transition-colors cursor-pointer"
                style="color: var(--text-tertiary);">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Tab switcher -->
      <div class="mx-6 mb-6 flex rounded-xl p-1" style="background: var(--bg-surface-hover);">
        <button (click)="auth.authTab.set('signin')"
                class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 cursor-pointer"
                [style.background]="auth.authTab() === 'signin' ? 'var(--bg-surface)' : 'transparent'"
                [style.color]="auth.authTab() === 'signin' ? 'var(--text-primary)' : 'var(--text-tertiary)'"
                [style.box-shadow]="auth.authTab() === 'signin' ? 'var(--shadow-sm)' : 'none'">
          Sign in
        </button>
        <button (click)="auth.authTab.set('create')"
                class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 cursor-pointer"
                [style.background]="auth.authTab() === 'create' ? 'var(--bg-surface)' : 'transparent'"
                [style.color]="auth.authTab() === 'create' ? 'var(--text-primary)' : 'var(--text-tertiary)'"
                [style.box-shadow]="auth.authTab() === 'create' ? 'var(--shadow-sm)' : 'none'">
          Create account
        </button>
      </div>

      <!-- Form -->
      <div class="px-6 pb-6">
        <!-- Error -->
        @if (error) {
          <div class="mb-4 p-3 rounded-xl text-sm font-medium flex items-center gap-2"
               style="background: rgba(239, 68, 68, 0.1); color: var(--color-critical); border: 1px solid rgba(239, 68, 68, 0.15);">
            <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
            {{ error }}
          </div>
        }

        @if (auth.authTab() === 'create') {
          <!-- Full name -->
          <label class="block mb-4">
            <span class="text-xs font-medium mb-1.5 block" style="color: var(--text-secondary);">Full name</span>
            <div class="relative">
              <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4" style="color: var(--text-tertiary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              <input type="text" [(ngModel)]="name" placeholder="Alex Johnson"
                     class="w-full pl-10 pr-4 py-3 rounded-xl text-sm outline-none transition-all"
                     style="background: var(--bg-surface-hover); border: 1px solid var(--border-default); color: var(--text-primary);"
                     (focus)="onFocus($event)" (blur)="onBlur($event)">
            </div>
          </label>
        }

        <!-- Email -->
        <label class="block mb-4">
          <span class="text-xs font-medium mb-1.5 block" style="color: var(--text-secondary);">Email address</span>
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4" style="color: var(--text-tertiary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <input type="email" [(ngModel)]="email" placeholder="you&#64;example.com"
                   class="w-full pl-10 pr-4 py-3 rounded-xl text-sm outline-none transition-all"
                   style="background: var(--bg-surface-hover); border: 1px solid var(--border-default); color: var(--text-primary);"
                   (focus)="onFocus($event)" (blur)="onBlur($event)">
          </div>
        </label>

        <!-- Password -->
        <label class="block mb-1">
          <div class="flex justify-between items-center mb-1.5">
            <span class="text-xs font-medium" style="color: var(--text-secondary);">Password</span>
            @if (auth.authTab() === 'signin') {
              <button class="text-xs font-medium transition-colors cursor-pointer" style="color: var(--color-primary);">Forgot password?</button>
            }
          </div>
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4" style="color: var(--text-tertiary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;"
                   class="w-full pl-10 pr-10 py-3 rounded-xl text-sm outline-none transition-all"
                   style="background: var(--bg-surface-hover); border: 1px solid var(--border-default); color: var(--text-primary);"
                   (focus)="onFocus($event)" (blur)="onBlur($event)"
                   (keydown.enter)="submit()">
            <button (click)="showPassword = !showPassword" class="absolute right-3.5 top-1/2 -translate-y-1/2 p-0.5 cursor-pointer" style="color: var(--text-tertiary);">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                @if (showPassword) {
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21"/>
                } @else {
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                }
              </svg>
            </button>
          </div>
        </label>

        @if (auth.authTab() === 'create') {
          <!-- Confirm password -->
          <label class="block mt-4 mb-4">
            <span class="text-xs font-medium mb-1.5 block" style="color: var(--text-secondary);">Confirm password</span>
            <div class="relative">
              <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4" style="color: var(--text-tertiary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
              <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;"
                     class="w-full pl-10 pr-4 py-3 rounded-xl text-sm outline-none transition-all"
                     style="background: var(--bg-surface-hover); border: 1px solid var(--border-default); color: var(--text-primary);"
                     (focus)="onFocus($event)" (blur)="onBlur($event)"
                     (keydown.enter)="submit()">
            </div>
          </label>

          <!-- Terms -->
          <label class="flex items-start gap-2.5 mb-6 cursor-pointer">
            <input type="checkbox" [(ngModel)]="agreeTerms"
                   class="mt-0.5 w-4 h-4 rounded accent-[var(--color-primary)]">
            <span class="text-xs leading-relaxed" style="color: var(--text-secondary);">
              I agree to the <a class="underline" style="color: var(--color-primary);">Terms</a> &amp; <a class="underline" style="color: var(--color-primary);">Privacy Policy</a>
            </span>
          </label>
        } @else {
          <div class="mb-6"></div>
        }

        <!-- Submit -->
        <button (click)="submit()" [disabled]="isSubmitting"
                class="w-full py-3.5 rounded-xl font-semibold text-sm text-white flex items-center justify-center gap-2 transition-all duration-200 disabled:opacity-50 cursor-pointer"
                style="background: linear-gradient(135deg, var(--color-primary), #6366F1); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);"
                [class.hover:-translate-y-0.5]="!isSubmitting">
          @if (isSubmitting) {
            <div class="w-4 h-4 rounded-full border-2 border-white/30 border-t-white animate-spin"></div>
          }
          {{ auth.authTab() === 'signin' ? 'Sign in' : 'Create account' }}
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
          </svg>
        </button>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-5">
          <div class="flex-1 h-px" style="background: var(--border-default);"></div>
          <span class="text-xs" style="color: var(--text-tertiary);">or</span>
          <div class="flex-1 h-px" style="background: var(--border-default);"></div>
        </div>

        <!-- Google button -->
        <button (click)="googleSignIn()"
                class="w-full py-3 rounded-xl font-medium text-sm flex items-center justify-center gap-2.5 transition-all duration-200 hover:-translate-y-0.5 cursor-pointer"
                style="background: var(--bg-surface-hover); border: 1px solid var(--border-default); color: var(--text-primary);">
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>
      </div>
    </div>
  </div>
}
